# .github/workflows/ci.yml
name: Auditoria de Integridade (CI) - Dermato AI

# 1. GATILHO: Quando esse robô deve acordar?
# R: Toda vez que alguém mandar código para a branch 'main'.
on:
  push:
    branches: [ "main" ]

# 2. TRABALHO: O que o robô deve fazer?
jobs:
  testes-automatizados:
    # Cria uma máquina Ubuntu limpa na nuvem da Microsoft/GitHub
    runs-on: ubuntu-latest

    steps:
    # Passo A: Baixa o seu código do cofre para essa máquina temporária
    - name: 📥 Clonar o Repositório
      uses: actions/checkout@v4

    # Passo B: Instala o Python exato que usamos (Garante Paridade de Ambiente)
    - name: 🐍 Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # Deixa as instalações mais rápidas nas próximas vezes

    # Passo C: Instala as bibliotecas (Se houver conflito de versão, o erro estoura aqui!)
    - name: 📦 Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Passo D: A Prova de Fogo! Executa os testes matemáticos da IA
    # Nota: Vamos testar apenas o modelo, pois a base de dados pesada não subiu pro GitHub
    - name: 🔬 Executar Pytest (Auditoria do Modelo)
      run: |
        pytest tests/test_model.py -v